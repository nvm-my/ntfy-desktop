name: Auto-label integration PRs

# Tags dev<->master integration PRs with `skip-changelog` so the release-notes
# generator (configured in .github/release.yml) leaves them out. Without this a
# stable release lists both the feature PR (feature -> dev) and the dev -> master
# merge PR for the same change. dev/master are same-repo branches, so the default
# pull_request event's GITHUB_TOKEN has the write scope we need (no pull_request_target).
on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write          # gh label create (labels are the issues API)
  pull-requests: write   # gh pr edit --add-label

jobs:
  label:
    # Only the two integration directions; feature -> dev PRs (the real changelog
    # entries) are deliberately left untouched.
    if: >-
      (github.event.pull_request.base.ref == 'master' && github.event.pull_request.head.ref == 'dev') ||
      (github.event.pull_request.base.ref == 'dev' && github.event.pull_request.head.ref == 'master')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      NUMBER: ${{ github.event.pull_request.number }}
    steps:
      # Idempotent: --force updates the label if it already exists, so a missing
      # label never fails the add step below.
      - name: Ensure the label exists
        run: gh label create skip-changelog --repo "$REPO" --color ededed --description "Kept out of generated release notes" --force
      - name: Label the PR
        run: gh pr edit "$NUMBER" --repo "$REPO" --add-label skip-changelog
