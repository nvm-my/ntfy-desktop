# Configuration for GitHub's auto-generated release notes (the "What's Changed"
# section the release workflow builds via the generate-notes API).
#
# Why this exists: stable releases are tagged on `master`, and the compare range for
# a stable tag spans the `dev -> master` integration merge. That makes the generator
# list BOTH the real feature PR (feature -> dev) and the noise `dev -> master` merge
# PR for the same change. The auto-label workflow tags those integration PRs with
# `skip-changelog`; excluding that label here keeps only the informative feature PRs.
changelog:
  exclude:
    labels:
      - skip-changelog
